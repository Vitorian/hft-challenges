title: "Challenge 17: Cross-CCX Ring Buffer"
slug: cross-ccx-ring
track: cpp_latency
description: |
  Same interface as [Challenge 05](/challenge/ring-buffer) — but the producer
  and consumer now run on **different CCXes** with separate L3 caches.

  ### Why This Matters

  Everyone optimizes their SPSC queue for cores that share an L3 cache —
  and it works beautifully. But what happens when two processes on
  different CCXes need to talk? The same solution that scored 250 cycles
  on shared-L3 cores suddenly scores **1,500+** across the Infinity Fabric.

  This is not a contrived scenario. On any multi-CCX AMD chip (Ryzen 3000+,
  EPYC) or multi-die Intel Xeon (Sapphire Rapids, Granite Rapids), core
  pairs that share an L3 are the *minority*. Most core-to-core
  communication crosses a fabric interconnect, and the latency penalty is
  5-6× — showing up as unexplained P99 jitter that nobody traces back to
  cache topology.

  The key insight: **the optimal cross-CCX ring buffer is a fundamentally
  different design from the optimal same-CCX ring buffer.** Taking your
  Challenge 05 winner and running it here won't cut it. The bottleneck
  shifts from computation to cache line transfer cost, and that demands
  a different architecture.

  ### What is a CCX?

  AMD Ryzen and EPYC processors are built from **Core Complexes (CCXes)** —
  groups of 3-4 cores that share an L3 cache. Multiple CCXes are connected
  via the **Infinity Fabric (IF)**, an on-die interconnect. Intel uses a
  similar topology — multi-die Xeons use the **EMIB** interconnect between
  tiles, and even consumer chips (Alder Lake+) split cores into clusters
  with separate cache domains.

  In Challenge 05, both threads share the same L3. A cache line bounce
  costs ~10-15ns. Here, every cache line that crosses between CCXes travels
  through the Infinity Fabric at **~70-80ns on Zen 2** (~40-50ns on
  Zen 4/5). Your Challenge 05 solution will work — but it will be slow.
  How slow? Submit it and find out.

  ### API

  Identical to Challenge 05:

  ```cpp
  namespace hftu {
  class RingBuffer {
  public:
      explicit RingBuffer(size_t capacity);
      bool push(const Message& msg);
      bool pop(Message& out);
      size_t size() const;
  };
  }
  ```

  - Capacity is always a power of 2
  - Must be thread-safe for one producer + one consumer (no mutexes)
  - Producer and consumer run on separate CCXes (separate L3 caches)

  ### Hints

  - Count the number of cache lines that cross the Infinity Fabric per
    operation in your current solution.
  - Ask yourself: which of those crossings are strictly necessary?

  ### Getting Started

  ```bash
  cd challenge-17-cross-ccx-ring
  cmake -B build -DCMAKE_BUILD_TYPE=Release
  cmake --build build
  ./build/benchmark
  ```

  > **Tip:** Your Challenge 05 solution is a valid starting point. Submit it
  > first to see the cross-CCX penalty, then optimize from there.

  > **Note:** The public benchmark you run locally uses a different seed and
  > workload than the certified benchmark on the server. Your local score may
  > differ significantly from your submitted score.
